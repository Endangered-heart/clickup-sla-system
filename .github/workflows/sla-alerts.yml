name: ClickUp SLA Alerts

on:
  schedule:
    # 9 AM IST = 3:30 AM UTC
    - cron: '30 3 * * *'
    # 5 PM IST = 11:30 AM UTC
    - cron: '30 11 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger ClickUp SLA Sync
        run: |
          curl -X POST https://clickup-sla-system-production.up.railway.app/sync
